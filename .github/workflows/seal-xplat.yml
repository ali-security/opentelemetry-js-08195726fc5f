name: seal-xplat

on: [push, workflow_dispatch]

jobs:
  node-tests:
    strategy:
      fail-fast: false
      matrix:
        node_version:
          - "14"
          - "16"
          - "18"
          - "20"
    runs-on: ubuntu-latest
    steps:
      - name: Configure npm time machine registry
        run: npm config set registry https://:2023-08-08T13%3A21%3A06.477000Z@time-machines-npm.sealsecurity.io/
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install
        run: npm install --ignore-scripts

      - name: Bootstrap
        run: npx lerna bootstrap --scope @opentelemetry/propagator-jaeger --include-dependencies --hoist --nohoist='zone.js'

      - name: Generate version.ts and compile
        run: |
          for d in api packages/opentelemetry-semantic-conventions packages/opentelemetry-core packages/opentelemetry-propagator-jaeger; do
            (cd "$d" && npm run version --ignore-scripts && npm run compile --ignore-scripts)
          done

      - name: Unit tests
        run: |
          cd packages/opentelemetry-propagator-jaeger
          npm test

  node-windows-tests:
    runs-on: windows-latest
    steps:
      - name: Configure npm time machine registry
        run: npm config set registry https://:2023-08-08T13%3A21%3A06.477000Z@time-machines-npm.sealsecurity.io/
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --ignore-scripts

      - name: Bootstrap
        run: npx lerna bootstrap --scope @opentelemetry/propagator-jaeger --include-dependencies --hoist --nohoist='zone.js'

      - name: Set bash as npm script-shell
        run: npm config set script-shell "C:\\Program Files\\git\\bin\\bash.exe"

      - name: Generate version.ts and compile
        shell: bash
        run: |
          for d in api packages/opentelemetry-semantic-conventions packages/opentelemetry-core packages/opentelemetry-propagator-jaeger; do
            (cd "$d" && npm run version --ignore-scripts && npm run compile --ignore-scripts)
          done

      - name: Unit tests
        shell: bash
        run: |
          cd packages/opentelemetry-propagator-jaeger
          npm test
